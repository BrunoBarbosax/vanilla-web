<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Vanilla</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}

body{
  min-height:100vh;
  color:white;
  background:
    radial-gradient(circle at 15% 10%, rgba(255,0,183,.24), transparent 25%),
    linear-gradient(rgba(0,0,0,.84),rgba(0,0,0,.94)),
    url("./background.jpg") center/cover fixed no-repeat;
  padding:24px;
}

.hidden{display:none!important}

.login-wrap{
  min-height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-card,.header,.card,.stat,.empty{
  background:rgba(15,15,25,.9);
  border:1px solid rgba(255,255,255,.12);
  border-radius:24px;
  padding:22px;
  box-shadow:0 24px 60px rgba(0,0,0,.45),0 0 28px rgba(255,0,183,.12);
  backdrop-filter:blur(10px);
}

.login-card{
  width:100%;
  max-width:430px;
  text-align:center;
}

.login-card img{
  width:250px;
  max-width:100%;
  margin-bottom:18px;
  filter:drop-shadow(0 0 18px rgba(255,200,0,.35));
}

h1{color:#ff4de1;font-size:36px;margin-bottom:8px;text-shadow:0 0 18px rgba(255,77,225,.3)}
p{color:#ddd;margin-bottom:14px}

input,select{
  width:100%;
  padding:13px;
  margin:7px 0 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.14);
  background:rgba(255,255,255,.08);
  color:white;
  outline:none;
}

select option{background:#151520;color:white}

button{
  padding:12px 16px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  color:white;
  font-weight:bold;
  background:linear-gradient(90deg,#ff00b7,#ff4de1);
  margin:4px 6px 4px 0;
  transition:.2s;
}

button:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn2{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14)}
.btn-danger{background:linear-gradient(90deg,#d7263d,#ff5e7a)}

.header{margin-bottom:18px}

.actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:12px;
}

.filters{
  display:grid;
  grid-template-columns:repeat(4,minmax(180px,1fr));
  gap:12px;
  margin-bottom:18px;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,minmax(180px,1fr));
  gap:14px;
  margin-bottom:18px;
}

.stat small{
  display:block;
  color:#d8b8ff;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:11px;
  margin-bottom:8px;
}

.stat strong{font-size:28px}

.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(320px,1fr));
  gap:16px;
}

.card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  margin-bottom:12px;
}

.badge{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
  background:rgba(255,77,225,.15);
  color:#ffc9f8;
  border:1px solid rgba(255,77,225,.25);
}

.user{color:#ff4de1;font-weight:bold;margin-bottom:4px}
.date{color:#bbb;font-size:13px}

pre{
  white-space:pre-wrap;
  line-height:1.6;
  background:rgba(0,0,0,.35);
  border-left:4px solid #ff4de1;
  padding:14px;
  border-radius:14px;
  margin-top:12px;
}

img.comprovante{
  width:260px!important;
  max-width:100%!important;
  max-height:180px!important;
  object-fit:cover!important;
  border-radius:14px!important;
  margin-top:12px!important;
  border:1px solid rgba(255,255,255,.14)!important;
  display:block;
}

.empty{text-align:center;color:#ddd}

@media(max-width:1000px){
  .filters,.stats,.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<section id="adminLogin" class="login-wrap">
  <div class="login-card">
    <img src="./logo.png" alt="Vanilla">
    <h1>👑 Admin Login</h1>
    <p>Entre como administrador para acessar todos os registros.</p>

    <input id="adminUser" placeholder="Usuário admin">
    <input id="adminPass" type="password" placeholder="Senha admin">

    <button onclick="loginAdmin()">Entrar no painel</button>
    <div id="loginMsg"></div>
  </div>
</section>

<section id="adminPanel" class="hidden">
  <div class="header">
    <h1>👑 Painel Admin Vanilla</h1>
    <p>Controle geral de vendas, lavagens, desmanches e farms registrados no sistema.</p>

    <div class="actions">
      <button onclick="carregar()">🔄 Atualizar</button>
      <button class="btn2" onclick="exportarTXT()">📄 Exportar TXT</button>
      <button class="btn2" onclick="window.location.href='/'">🏠 Painel</button>
      <button class="btn-danger" onclick="logoutAdmin()">🚪 Sair</button>
    </div>
  </div>

  <div class="filters">
    <select id="filtroTipo" onchange="renderizar()">
      <option value="todos">Todos os tipos</option>
      <option value="Venda">Venda</option>
      <option value="Lavagem">Lavagem</option>
      <option value="Desmanche">Desmanche</option>
      <option value="Farm">Farm</option>
    </select>

    <input id="filtroUsuario" oninput="renderizar()" placeholder="Filtrar por usuário">
    <input id="filtroTexto" oninput="renderizar()" placeholder="Buscar no conteúdo">
    <button class="btn2" onclick="limparFiltros()">Limpar filtros</button>
  </div>

  <div class="stats">
    <div class="stat"><small>Total</small><strong id="statTotal">0</strong></div>
    <div class="stat"><small>Vendas</small><strong id="statVendas">0</strong></div>
    <div class="stat"><small>Lavagens/Desmanches</small><strong id="statOperacoes">0</strong></div>
    <div class="stat"><small>Farms</small><strong id="statFarms">0</strong></div>
  </div>

  <div id="logs" class="grid"></div>
</section>

<script>
let todosLogs = [];
let filtrados = [];

async function verificarAdmin(){
  const res = await fetch('/api/me');
  const user = await res.json();

  if(user && user.is_admin){
    document.getElementById('adminLogin').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    carregar();
  }else{
    document.getElementById('adminLogin').classList.remove('hidden');
    document.getElementById('adminPanel').classList.add('hidden');
  }
}

async function loginAdmin(){
  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('adminPass').value.trim();
  const msg = document.getElementById('loginMsg');

  if(!username || !password){
    msg.innerText = 'Preencha usuário e senha.';
    return;
  }

  const res = await fetch('/api/login', {
    method:'POST',
    headers:{ 'Content-Type':'application/json' },
    body:JSON.stringify({ username, password })
  });

  const data = await res.json();

  if(data.error){
    msg.innerText = data.error;
    return;
  }

  if(!data.user || !data.user.is_admin){
    msg.innerText = 'Esse usuário não é administrador.';
    await fetch('/api/logout');
    return;
  }

  msg.innerText = '';
  verificarAdmin();
}

async function logoutAdmin(){
  await fetch('/api/logout');
  todosLogs = [];
  filtrados = [];
  document.getElementById('logs').innerHTML = '';
  verificarAdmin();
}

async function carregar(){
  const res = await fetch('/api/admin/logs');
  const data = await res.json();

  if(data.error){
    document.getElementById('logs').innerHTML =
      `<div class="empty">❌ ${data.error}<br><br>Faça login como admin primeiro.</div>`;
    return;
  }

  todosLogs = data;
  renderizar();
}

function normalizar(txt){
  return String(txt || '').toLowerCase();
}

function renderizar(){
  const tipo = document.getElementById('filtroTipo').value;
  const usuario = normalizar(document.getElementById('filtroUsuario').value);
  const texto = normalizar(document.getElementById('filtroTexto').value);

  filtrados = todosLogs.filter(log => {
    const okTipo = tipo === 'todos' || log.tipo === tipo;
    const okUsuario = normalizar(log.username).includes(usuario);
    const okTexto = normalizar(log.conteudo).includes(texto);
    return okTipo && okUsuario && okTexto;
  });

  atualizarStats();
  montarCards();
}

function atualizarStats(){
  document.getElementById('statTotal').innerText = filtrados.length;
  document.getElementById('statVendas').innerText =
    filtrados.filter(l => l.tipo === 'Venda').length;

  document.getElementById('statOperacoes').innerText =
    filtrados.filter(l => l.tipo === 'Lavagem' || l.tipo === 'Desmanche').length;

  document.getElementById('statFarms').innerText =
    filtrados.filter(l => l.tipo === 'Farm').length;
}

function montarCards(){
  const box = document.getElementById('logs');

  if(!filtrados.length){
    box.innerHTML = `<div class="empty">Nenhum registro encontrado.</div>`;
    return;
  }

  box.innerHTML = filtrados.map(log => `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="user">👤 ${escapeHtml(log.username)}</div>
          <div class="date">🕒 ${formatarData(log.data)}</div>
        </div>
        <span class="badge">${iconeTipo(log.tipo)} ${escapeHtml(log.tipo)}</span>
      </div>

      <pre>${escapeHtml(log.conteudo || '')}</pre>

      ${log.imagem ? `<img class="comprovante" src="${escapeHtml(log.imagem)}" alt="Comprovante">` : ''}
    </div>
  `).join('');
}

function iconeTipo(tipo){
  if(tipo === 'Venda') return '🛒';
  if(tipo === 'Lavagem') return '🧼';
  if(tipo === 'Desmanche') return '🔧';
  if(tipo === 'Farm') return '🌾';
  return '📌';
}

function formatarData(data){
  if(!data) return '-';
  const d = new Date(data);
  if(isNaN(d.getTime())) return data;
  return d.toLocaleString('pt-BR');
}

function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}

function limparFiltros(){
  document.getElementById('filtroTipo').value = 'todos';
  document.getElementById('filtroUsuario').value = '';
  document.getElementById('filtroTexto').value = '';
  renderizar();
}

function exportarTXT(){
  if(!filtrados.length){
    alert('Não há registros para exportar.');
    return;
  }

  const conteudo = filtrados.map(log => `
[${log.tipo}] ${log.username} - ${formatarData(log.data)}
${log.conteudo}
------------------------------
`).join('\n');

  const blob = new Blob([conteudo], { type:'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'relatorio-admin-vanilla.txt';
  a.click();
  URL.revokeObjectURL(url);
}

verificarAdmin();
</script>

</body>
</html>
